<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frieds</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
   <div class="box">
        <div class="rectangle">
            <!-- КРАСНЫЙ ПРЯМОУГОЛЬНИК ПОД ЛОГО -->
            <div class="logo-bg"></div>
    
            <!-- ЛОГОТИП (сверху, поверх текста) -->
            <img src="images/logo.svg" alt="логотип" class="logo">

            <!-- БЕГУЩАЯ СТРОКА ВНУТРИ ПРЯМОУГОЛЬНИКА -->
            <div class="marquee-container">
                <div class="marquee-content" id="marqueeContent">
                    <h1 class="title">Узнай всё о дружбе</h1>
                    <h1 class="title">Узнай всё о дружбе</h1>
                    <h1 class="title">Узнай всё о дружбе</h1>
                    <h1 class="title">Узнай всё о дружбе</h1>
                </div>
            </div>
            <!-- ЛЕВЫЙ ГЛАЗ -->
            <img src="images/white_circle.svg" alt="белый круг" class="circle circle-left">
            <img src="images/eye.svg" alt="зрачок" class="eye eye-left">
            <img src="images/eyelid.svg" alt="веко" class="eyelid eyelid-left">
            
            <!-- РОТ (между глазами) -->
            <div class="mouth">
                <img src="images/closed_mouth.svg" alt="закрытый рот" class="mouth-img mouth-closed">
                <img src="images/open_mouth.svg" alt="открытый рот" class="mouth-img mouth-open-1">
                <img src="images/half_mouth.svg" alt="полуоткрытый рот" class="mouth-img mouth-half">
                <img src="images/open_mouth.svg" alt="открытый рот" class="mouth-img mouth-open-2">
            </div>
            
            <!-- ПРАВЫЙ ГЛАЗ -->
            <img src="images/white_circle.svg" alt="белый круг" class="circle circle-right">
            <img src="images/eye.svg" alt="зрачок" class="eye eye-right">
            <img src="images/eyelid.svg" alt="веко" class="eyelid eyelid-right">
        </div>
    </div>
    <script src="js/script.js"></script>

   <!-- Фиолетовый бокс -->
<div class="purple-box">
    
    <!-- КРАСНАЯ ПЛАШКА ПОД ТЕКСТОМ -->
    <div class="logo-bg-purple"></div>
    
    <!-- ТЕКСТ ВМЕСТО ЛОГО (белый, 64px) -->
    <h2 class="purple-text">Кликай на друзей,<br>а не на деньги</h2>

    <!-- БЕГУЩАЯ СТРОКА -->
    <div class="marquee-container-purple">
        <div class="marquee-content-purple" id="marqueeContentPurple">
            <h1 class="title-purple">Не имей 100 рублей, а имей 100 друзей</h1>
            <h1 class="title-purple">Не имей 100 рублей, а имей 100 друзей</h1>
            <h1 class="title-purple">Не имей 100 рублей, а имей 100 друзей</h1>
            <h1 class="title-purple">Не имей 100 рублей, а имей 100 друзей</h1>
        </div>
    </div>
    
    <!-- ФОНОВОЕ ИЗОБРАЖЕНИЕ -->
    <img src="images/purple_background.svg" alt="Purple Background">
    
</div>
     <!-- Зелёный бокс -->
    <div class="green-box">
        <img src="images/green_background.svg" alt="Green background">
    </div>

     <!-- Голубой бокс -->
    <div class="blue-box">
        <img src="images/blue_background.svg" alt="Blue background">
    </div>

      <!-- Розовый бокс -->
    <div class="pink-box">
        <img src="images/pink_background.svg" alt="Pink background">
    </div>
        <!-- Синий бокс -->
    <div class="dark-blue-box">
        <img src="images/dark_blue_background.svg" alt="Dark blue background">
    </div>
    
</body>
</html>
